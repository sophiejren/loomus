<style>
/* ============================================================
   LOOMUS — The Global Founders Club
   Single-page site · colours echo the playful brand logo
   ============================================================ */

:root{
  --ink:#0E0E0E;
  --pink:#F25CA0;
  --orange:#F15A24;
  --blue:#2F6BE5;
  --yellow:#FFC528;
  --navy:#16163C;
  --paper:#FFFFFF;
  --cream:#FFF6E9;
  --mist:#F1EEFF;
  --sky:#EAF1FF;
  --blush:#FFEAF3;
  --line:#0E0E0E;
  --r-lg:34px;
  --r-md:22px;
  --shadow:6px 8px 0 var(--ink);
  --shadow-sm:4px 5px 0 var(--ink);
}

*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;scroll-padding-top:90px}
body{
  font-family:"Baloo 2","Noto Sans SC",system-ui,-apple-system,sans-serif;
  color:var(--ink);
  background:var(--paper);
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}
section{position:relative}
.wrap{max-width:1180px;margin:0 auto;padding:0 26px}

h1,h2,h3{font-family:"Baloo 2","Noto Sans SC",sans-serif;line-height:1.15;font-weight:800}

/* ---------- Section headings ---------- */
.eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  font-weight:700;font-size:.82rem;letter-spacing:.12em;
  text-transform:uppercase;
  background:var(--ink);color:#fff;
  padding:7px 16px;border-radius:999px;
}
.section-head{max-width:660px;margin-bottom:46px}
.section-head h2{font-size:clamp(2rem,4.4vw,3rem);margin:18px 0 12px}
.section-head p{color:#444;font-weight:400;font-size:1.05rem}

/* ---------- Buttons ---------- */
.btn{
  display:inline-flex;align-items:center;gap:9px;
  font-family:"Baloo 2","Noto Sans SC",sans-serif;
  font-weight:700;font-size:1rem;
  padding:14px 28px;border-radius:999px;
  border:2.5px solid var(--ink);
  background:#fff;color:var(--ink);
  cursor:pointer;transition:transform .15s ease, box-shadow .15s ease;
  box-shadow:var(--shadow-sm);
}
.btn:hover{transform:translate(-2px,-2px);box-shadow:6px 7px 0 var(--ink)}
.btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink)}
.btn--pink{background:var(--pink);color:#fff}
.btn--blue{background:var(--blue);color:#fff}
.btn--yellow{background:var(--yellow)}
.btn--ink{background:var(--ink);color:#fff}

/* ============================================================
   Navigation
   ============================================================ */
header{
  position:sticky;top:0;z-index:100;
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(10px);
  border-bottom:2.5px solid var(--ink);
  transition:box-shadow .2s ease;
}
header.scrolled{box-shadow:0 6px 0 rgba(14,14,14,.08)}
.nav{display:flex;align-items:center;justify-content:space-between;height:74px}

/* —— LOOMUS text wordmark —— */
.logo{display:flex;align-items:center;gap:0;cursor:pointer}
.logo .word{
  font-family:"Baloo 2",sans-serif;font-weight:800;
  font-size:1.7rem;letter-spacing:-.02em;color:var(--ink);
  display:flex;align-items:center;
}
.logo .o{
  display:inline-grid;place-items:center;
  width:.92em;height:.92em;border-radius:50%;
  border:.16em solid var(--ink);
  margin:0 .015em;
}
.logo .o::after{content:"";width:.34em;height:.34em;border-radius:50%}
.logo .o--pink::after{background:var(--pink)}
.logo .o--blue::after{background:var(--blue)}
.logo-img{height:34px;width:auto;display:block}

.nav-links{display:flex;align-items:center;gap:26px}
.nav-links a{font-weight:600;font-size:.96rem;position:relative}
.nav-links a::after{
  content:"";position:absolute;left:0;bottom:-5px;
  width:0;height:3px;background:var(--pink);border-radius:3px;
  transition:width .2s ease;
}
.nav-links a:hover::after{width:100%}
.nav-cta{display:flex;align-items:center;gap:12px}
.nav-toggle{
  display:none;background:none;border:none;cursor:pointer;
  width:42px;height:42px;
}
.nav-toggle span{display:block;width:24px;height:3px;background:var(--ink);
  border-radius:3px;margin:5px auto;transition:.25s}

/* —— Language switcher —— */
.langpick{position:relative}
.lang{
  font-weight:700;font-size:.86rem;line-height:1;cursor:pointer;
  font-family:inherit;
  border:2.5px solid var(--ink);border-radius:999px;
  padding:8px 13px;background:#fff;
  display:inline-flex;align-items:center;gap:5px;
}
.lang:hover{background:var(--yellow)}
.lang-menu{
  position:absolute;top:calc(100% + 8px);right:0;
  background:#fff;border:2.5px solid var(--ink);border-radius:14px;
  box-shadow:var(--shadow-sm);padding:6px;
  display:none;min-width:160px;z-index:200;
}
.lang-menu.open{display:block}
.lang-menu a{display:block;padding:9px 13px;border-radius:9px;font-weight:600;font-size:.9rem}
.lang-menu a:hover{background:var(--cream)}
.lang-menu a.active{background:var(--yellow)}

/* ============================================================
   Mascot creatures (drawn in CSS)
   ============================================================ */
.creature{position:relative;border-radius:56% 44% 50% 50% / 62% 60% 40% 38%}
.creature .face{
  position:absolute;left:0;right:0;top:42%;
  display:flex;flex-direction:column;align-items:center;gap:5px;
}
.creature .eyes{display:flex;gap:11px}
.creature .eyes i{
  width:14px;height:11px;
  border:3px solid var(--ink);
  border-color:transparent transparent var(--ink) transparent;
  border-radius:50%;
}
.creature .dots{display:flex;gap:3.5px;margin-top:1px}
.creature .dots b{width:4.5px;height:4.5px;border-radius:50%;background:var(--ink);display:block}
.creature.c-pink{background:var(--pink)}
.creature.c-orange{background:var(--orange)}
.creature.c-blue{background:var(--blue)}
.creature.c-yellow{background:var(--yellow)}
.creature.c-navy{background:var(--navy)}

@keyframes bob{0%,100%{transform:translateY(0) rotate(var(--rot,0deg))}
  50%{transform:translateY(-16px) rotate(var(--rot,0deg))}}
.float{animation:bob 6s ease-in-out infinite}

/* ============================================================
   HERO
   ============================================================ */
.hero{
  background:
    radial-gradient(circle at 12% 18%, var(--blush) 0, transparent 38%),
    radial-gradient(circle at 88% 72%, var(--sky) 0, transparent 42%),
    var(--cream);
  border-bottom:2.5px solid var(--ink);
  padding:78px 0 96px;
  overflow:hidden;
}
.hero .wrap{display:grid;grid-template-columns:1.05fr .95fr;gap:40px;align-items:center}
.hero h1{
  font-size:clamp(2.4rem,5.4vw,4.1rem);
  letter-spacing:-.02em;margin:20px 0 22px;
}
.hero h1 .hl{
  background:linear-gradient(180deg,transparent 62%, var(--yellow) 62%);
  padding:0 4px;
}
.hero p.lead{font-size:1.13rem;font-weight:400;color:#3a3a3a;max-width:540px;margin-bottom:30px}
.hero-actions{display:flex;gap:14px;flex-wrap:wrap}
.hero-mini{margin-top:26px;display:flex;align-items:center;gap:12px;font-weight:500;font-size:.95rem;color:#555}
.avatars{display:flex}
.avatars span{
  width:36px;height:36px;border-radius:50%;border:2.5px solid var(--ink);
  margin-left:-10px;display:grid;place-items:center;font-size:.9rem;
}
.avatars span:first-child{margin-left:0}

/* —— Hero creature stage —— */
.hero-stage{position:relative;height:440px}
.hero-stage .ring{
  position:absolute;border:3px solid var(--ink);border-radius:50%;
}
.r1{width:300px;height:300px;left:50%;top:50%;transform:translate(-50%,-50%);
  background:#fff;}
.cr-main{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:210px;height:230px;z-index:2;
  box-shadow:7px 9px 0 rgba(14,14,14,.12);
}
.cr-main .eyes i{width:18px;height:14px}
.cr-main .dots b{width:6px;height:6px}
.cr-a{position:absolute;width:108px;height:116px;top:-6px;left:-26px;--rot:-12deg;z-index:3}
.cr-b{position:absolute;width:92px;height:84px;bottom:6px;right:-24px;--rot:14deg;z-index:3}
.cr-c{position:absolute;width:66px;height:70px;top:42px;right:-6px;--rot:8deg;z-index:3}
.spark{position:absolute;font-family:"Baloo 2";font-weight:800;font-size:1.6rem}
.spark.s1{top:8px;right:64px;color:var(--orange)}
.spark.s2{bottom:34px;left:10px;color:var(--blue)}
.spark.s3{top:120px;left:-10px;color:var(--pink)}

/* ============================================================
   City ticker
   ============================================================ */
.ticker{
  background:var(--ink);color:#fff;overflow:hidden;
  border-bottom:2.5px solid var(--ink);
}
.ticker-track{display:flex;gap:0;white-space:nowrap;animation:scroll 32s linear infinite}
.ticker:hover .ticker-track{animation-play-state:paused}
@keyframes scroll{to{transform:translateX(-50%)}}
.ticker-track span{
  display:inline-flex;align-items:center;gap:14px;
  padding:15px 26px;font-weight:600;font-size:1rem;
}
.ticker-track span::after{content:"●";font-size:.5rem;color:var(--yellow);transform:translateY(-3px)}

/* ============================================================
   What we offer — five channels
   ============================================================ */
.offer{padding:92px 0}
.offer-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:16px}
.offer-card{
  border:2.5px solid var(--ink);border-radius:var(--r-md);
  padding:26px 18px;background:#fff;
  box-shadow:var(--shadow-sm);
  transition:transform .18s ease, box-shadow .18s ease;
}
.offer-card:hover{transform:translate(-3px,-3px);box-shadow:8px 10px 0 var(--ink)}
.offer-card .ic{
  width:58px;height:58px;border-radius:16px;border:2.5px solid var(--ink);
  display:grid;place-items:center;font-size:1.6rem;margin-bottom:16px;
}
.offer-card:nth-child(1) .ic{background:var(--pink)}
.offer-card:nth-child(2) .ic{background:var(--blue)}
.offer-card:nth-child(3) .ic{background:var(--yellow)}
.offer-card:nth-child(4) .ic{background:var(--orange)}
.offer-card:nth-child(5) .ic{background:var(--navy)}
.offer-card h3{font-size:1.18rem;margin-bottom:8px}
.offer-card p{font-size:.93rem;color:#555;font-weight:400}
.offer-card .more{display:inline-block;margin-top:14px;font-weight:700;font-size:.88rem}
.offer-card .more::after{content:" →"}

/* ============================================================
   Event Intel
   ============================================================ */
.events{background:var(--mist);padding:92px 0;border-top:2.5px solid var(--ink);border-bottom:2.5px solid var(--ink)}
.event-list{display:flex;flex-direction:column;gap:18px}
.event{
  display:grid;grid-template-columns:120px 1fr auto;gap:26px;align-items:center;
  background:#fff;border:2.5px solid var(--ink);border-radius:var(--r-md);
  padding:24px 28px;box-shadow:var(--shadow-sm);
  transition:transform .16s ease;
}
.event:hover{transform:translateX(6px)}
.event .date{
  text-align:center;border-right:2.5px dashed var(--ink);padding-right:20px;
}
.event .date .d{font-size:2.4rem;font-weight:800;line-height:1}
.event .date .m{font-weight:600;font-size:.9rem;color:#666}
.event .info h3{font-size:1.2rem;margin-bottom:5px}
.event .info p{font-size:.93rem;color:#555;font-weight:400}
.tag{
  display:inline-block;font-size:.74rem;font-weight:700;
  padding:3px 11px;border-radius:999px;border:2px solid var(--ink);margin-right:7px;
}
.tag.on{background:var(--yellow)}
.tag.off{background:var(--blue);color:#fff}
.event .go{
  width:48px;height:48px;border-radius:50%;border:2.5px solid var(--ink);
  display:grid;place-items:center;font-size:1.3rem;background:var(--pink);color:#fff;
}
/* —— Featured upcoming event —— */
.feature-event{
  background:var(--ink);color:#fff;
  border:2.5px solid var(--ink);border-radius:var(--r-lg);
  padding:42px 46px;margin-bottom:48px;
  position:relative;overflow:hidden;
}
.feature-event .fe-cr{position:absolute;width:92px;height:100px;top:-22px;right:46px;--rot:14deg;opacity:.92}
.feature-event .fe-label{
  display:inline-flex;align-items:center;gap:7px;
  font-weight:700;font-size:.76rem;letter-spacing:.1em;text-transform:uppercase;
  background:var(--yellow);color:var(--ink);padding:6px 14px;border-radius:999px;
}
.feature-event h3{font-size:clamp(1.7rem,3.8vw,2.7rem);margin:16px 0 8px;position:relative;z-index:2}
.feature-event .fe-meta{color:#c9c9d8;font-weight:500;font-size:1.02rem;margin-bottom:18px;max-width:600px}
.feature-event .fe-stats{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:24px}
.feature-event .fe-stats span{
  font-weight:700;font-size:.88rem;padding:6px 14px;border-radius:999px;border:2px solid #fff;
}

/* —— Past-events timeline —— */
.tl-title{font-size:1.45rem;margin-bottom:22px}
.timeline{position:relative;padding-left:32px}
.timeline::before{
  content:"";position:absolute;left:7px;top:10px;bottom:10px;
  width:3px;background:var(--ink);border-radius:3px;
}
.tl-item{position:relative;margin-bottom:18px}
.tl-item:last-child{margin-bottom:0}
.tl-item::before{
  content:"";position:absolute;left:-32px;top:24px;
  width:18px;height:18px;border-radius:50%;
  background:var(--yellow);border:3px solid var(--ink);
}
.tl-card{
  background:#fff;border:2.5px solid var(--ink);border-radius:var(--r-md);
  padding:22px 26px;box-shadow:var(--shadow-sm);
  transition:transform .16s ease;
}
.tl-card:hover{transform:translateX(6px)}
.tl-head{display:flex;align-items:center;gap:11px;flex-wrap:wrap;margin-bottom:7px}
.tl-date{font-family:"Baloo 2";font-weight:800;font-size:1.02rem;color:var(--blue)}
.tl-role{
  font-size:.71rem;font-weight:700;letter-spacing:.03em;text-transform:uppercase;
  padding:3px 10px;border-radius:999px;border:2px solid var(--ink);background:var(--cream);
}
.tl-card h3{font-size:1.15rem;margin-bottom:6px;line-height:1.3}
.tl-card p{font-size:.92rem;color:#555;font-weight:400}

/* —— This week in the Bay Area —— */
.bay{background:var(--sky);padding:74px 0;border-bottom:2.5px solid var(--ink)}
.bay .section-head{margin-bottom:30px}
.bay-badge{display:inline-flex;align-items:center;gap:8px;margin-top:14px;
  font-size:.82rem;font-weight:700;color:#555}
.bay-badge .live{
  width:9px;height:9px;border-radius:50%;background:var(--orange);display:inline-block;
  box-shadow:0 0 0 3px rgba(241,90,36,.22);
}
.bay-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.bay-card{
  background:#fff;border:2.5px solid var(--ink);border-radius:var(--r-md);
  padding:24px 26px;display:flex;flex-direction:column;
  box-shadow:var(--shadow-sm);
  transition:transform .16s ease, box-shadow .16s ease;
}
.bay-card:hover{transform:translate(-3px,-3px);box-shadow:8px 10px 0 var(--ink)}
.bay-card .when{
  align-self:flex-start;font-weight:700;font-size:.77rem;
  background:var(--blue);color:#fff;border:2px solid var(--ink);
  padding:4px 12px;border-radius:999px;
}
.bay-card h3{font-size:1.13rem;margin:13px 0 5px;line-height:1.3}
.bay-card .where{font-size:.85rem;font-weight:700;color:#888;margin-bottom:8px}
.bay-card p{font-size:.9rem;color:#555;font-weight:400;flex:1}
.bay-card .ev-link{margin-top:13px;font-weight:700;font-size:.86rem}
.bay-card .ev-link::after{content:" →"}
.bay-more{
  background:var(--ink);color:#fff;border-radius:var(--r-md);
  padding:17px 24px;font-weight:500;font-size:.92rem;
  display:flex;align-items:center;gap:8px 16px;flex-wrap:wrap;
}
.bay-more a{font-weight:700;color:var(--yellow);border-bottom:2px solid var(--yellow)}

/* ============================================================
   Latest News
   ============================================================ */
.news{padding:92px 0}
.news-grid{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:22px}
.n-card{
  border:2.5px solid var(--ink);border-radius:var(--r-md);
  overflow:hidden;background:#fff;box-shadow:var(--shadow-sm);
  display:flex;flex-direction:column;
  transition:transform .18s ease, box-shadow .18s ease;
}
.n-card:hover{transform:translate(-3px,-3px);box-shadow:8px 10px 0 var(--ink)}
.n-card .banner{
  height:150px;display:grid;place-items:center;
  border-bottom:2.5px solid var(--ink);position:relative;
}
.n-card:nth-child(1) .banner{background:var(--blue)}
.n-card:nth-child(2) .banner{background:var(--blush)}
.n-card:nth-child(3) .banner{background:var(--yellow)}
.n-card:nth-child(4) .banner{background:var(--mist)}
.n-card:nth-child(5) .banner{background:var(--orange)}
.n-card .banner .emoji{font-size:3rem}
.n-card .body{padding:22px 22px 24px;flex:1;display:flex;flex-direction:column}
.n-card .meta{font-size:.78rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#888;margin-bottom:8px}
.n-card h3{font-size:1.1rem;margin-bottom:8px}
.n-card.big h3{font-size:1.45rem}
.n-card p{font-size:.91rem;color:#555;font-weight:400;flex:1}
.n-card .read{margin-top:14px;font-weight:700;font-size:.86rem}
.n-card .read::after{content:" →"}
.news-grid .big{grid-row:span 2;grid-column:1}
.news-grid .big .banner{height:240px}

/* ============================================================
   Industry Insights
   ============================================================ */
.insights{background:var(--navy);color:#fff;padding:92px 0;border-top:2.5px solid var(--ink)}
.insights .eyebrow{background:var(--yellow);color:var(--ink)}
.insights .section-head p{color:#c9c9d8}
.ins-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
.ins-card{
  background:#fff;color:var(--ink);
  border:2.5px solid var(--ink);border-radius:var(--r-md);
  padding:30px 26px;position:relative;
  box-shadow:5px 6px 0 rgba(255,255,255,.18);
  transition:transform .18s ease;
}
.ins-card:hover{transform:translateY(-6px)}
.ins-card .num{
  font-family:"Baloo 2";font-weight:800;font-size:2.6rem;
  -webkit-text-stroke:2px var(--ink);color:transparent;line-height:1;
}
.ins-card .topic{font-size:.76rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--blue);margin:14px 0 8px}
.ins-card h3{font-size:1.2rem;margin-bottom:10px}
.ins-card p{font-size:.92rem;color:#555;font-weight:400}
.ins-card .auth{margin-top:18px;display:flex;align-items:center;gap:10px;font-size:.85rem;font-weight:600}
.ins-card .auth .dot{width:30px;height:30px;border-radius:50%;border:2.5px solid var(--ink);display:grid;place-items:center;font-size:.85rem}
.ins-card .src-link{display:inline-block;margin-top:16px;font-weight:700;font-size:.86rem;color:var(--blue)}
.ins-card .src-link::after{content:" →"}

/* ============================================================
   AI & Humanity — standing column + founder pledge
   ============================================================ */
.ai{padding:92px 0;background:var(--blush);border-top:2.5px solid var(--ink)}
.col-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;margin-bottom:28px}
.col-entry{
  background:#fff;border:2.5px solid var(--ink);border-radius:var(--r-md);
  padding:28px 26px;display:flex;flex-direction:column;
  box-shadow:var(--shadow-sm);
  transition:transform .18s ease, box-shadow .18s ease;
}
.col-entry:hover{transform:translate(-3px,-3px);box-shadow:8px 10px 0 var(--ink)}
.col-entry .issue{
  align-self:flex-start;
  font-weight:700;font-size:.74rem;letter-spacing:.06em;
  background:var(--yellow);border:2px solid var(--ink);
  padding:4px 12px;border-radius:999px;
}
.col-entry .ctopic{
  font-size:.77rem;font-weight:700;color:var(--pink);
  letter-spacing:.06em;text-transform:uppercase;margin:16px 0 6px;
}
.col-entry h3{font-size:1.16rem;margin-bottom:9px;line-height:1.3}
.col-entry p{font-size:.92rem;color:#555;font-weight:400;flex:1}
.col-entry .read{margin-top:14px;font-weight:700;font-size:.88rem}
.col-entry .read::after{content:" →"}

.pledge{
  background:var(--ink);color:#fff;
  border:2.5px solid var(--ink);border-radius:var(--r-lg);
  padding:44px 48px;position:relative;overflow:hidden;
  display:grid;grid-template-columns:1fr 1.05fr;gap:40px;align-items:center;
}
.pledge .creature{position:absolute;width:84px;height:92px;bottom:-26px;right:42px;--rot:-14deg;opacity:.9}
.pledge h3{font-size:clamp(1.45rem,3vw,2rem);margin-bottom:10px}
.pledge .pintro{color:#c9c9d8;font-weight:400;font-size:1rem}
.pledge ol{list-style:none;display:flex;flex-direction:column;gap:14px}
.pledge ol li{display:flex;gap:13px;font-weight:500;align-items:flex-start}
.pledge ol li .pn{
  flex:none;width:30px;height:30px;border-radius:50%;
  background:var(--yellow);color:var(--ink);
  display:grid;place-items:center;font-weight:800;font-size:.95rem;
}
.pledge .pcta{margin-top:20px}

/* —— Belief card link —— */
.belief-link{
  display:inline-flex;align-items:center;gap:6px;margin-top:18px;
  font-weight:700;font-size:.95rem;
  border-bottom:3px solid var(--ink);padding-bottom:2px;
  position:relative;z-index:2;
}
.belief-link:hover{color:var(--blue)}

/* ============================================================
   Data Insights Picks
   ============================================================ */
.reports{padding:92px 0;background:var(--cream);border-top:2.5px solid var(--ink);border-bottom:2.5px solid var(--ink)}
.report-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
.report{
  background:#fff;border:2.5px solid var(--ink);border-radius:var(--r-md);
  padding:26px 24px;box-shadow:var(--shadow-sm);
  display:flex;flex-direction:column;
  transition:transform .18s ease, box-shadow .18s ease;
}
.report:hover{transform:translate(-3px,-3px);box-shadow:8px 10px 0 var(--ink)}
.report-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:15px}
.rtype{
  font-size:.7rem;font-weight:700;letter-spacing:.05em;white-space:nowrap;
  text-transform:uppercase;
  padding:4px 11px;border-radius:999px;border:2px solid var(--ink);
}
.rtype--market{background:var(--blue);color:#fff}
.rtype--funding{background:var(--yellow)}
.rtype--survey{background:var(--pink);color:#fff}
.bars{display:flex;gap:3px;align-items:flex-end;height:36px;flex:none}
.bars i{width:7px;background:var(--ink);border-radius:2px 2px 0 0;display:block}
.report h3{font-size:1.14rem;margin-bottom:8px}
.report p{font-size:.91rem;color:#555;font-weight:400;flex:1}
.report-meta{display:flex;flex-wrap:wrap;gap:6px 14px;margin-top:15px;font-size:.81rem;font-weight:600;color:#888}
.report-meta .lock{color:var(--orange)}
.report-dl{
  margin-top:15px;padding-top:14px;border-top:2px dashed var(--ink);
  font-weight:700;font-size:.89rem;
}
.report-dl:hover{color:var(--blue)}
.reports .btn{margin-top:34px}

/* ============================================================
   Book Picks
   ============================================================ */
.books{padding:92px 0}
.book-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px}
.book{
  border:2.5px solid var(--ink);border-radius:var(--r-md);
  background:#fff;box-shadow:var(--shadow-sm);overflow:hidden;
  transition:transform .18s ease, box-shadow .18s ease;
}
.book:hover{transform:translate(-3px,-3px);box-shadow:8px 10px 0 var(--ink)}
.book .cover{
  height:210px;display:flex;flex-direction:column;justify-content:center;
  padding:24px;border-bottom:2.5px solid var(--ink);position:relative;
}
.book:nth-child(1) .cover{background:var(--pink)}
.book:nth-child(2) .cover{background:var(--blue);color:#fff}
.book:nth-child(3) .cover{background:var(--yellow)}
.book:nth-child(4) .cover{background:var(--orange);color:#fff}
.book .cover .ct{font-family:"Baloo 2";font-weight:800;font-size:1.4rem;line-height:1.2}
.book .cover .ce{font-size:.78rem;font-weight:600;opacity:.8;margin-top:6px}
.book .cover .quote{position:absolute;top:14px;right:18px;font-size:2.6rem;font-family:"Baloo 2";opacity:.32}
.book .b-body{padding:20px 22px 24px}
.book .b-body .author{font-size:.84rem;font-weight:700;color:#888;margin-bottom:6px}
.book .b-body h3{font-size:1.02rem;margin-bottom:8px}
.book .b-body p{font-size:.87rem;color:#555;font-weight:400}
.book .b-body .pick{
  margin-top:14px;display:inline-block;font-size:.74rem;font-weight:700;
  padding:4px 12px;border-radius:999px;border:2px solid var(--ink);background:var(--cream);
}

/* ============================================================
   About + stats
   ============================================================ */
.about{background:var(--sky);padding:92px 0;border-top:2.5px solid var(--ink);border-bottom:2.5px solid var(--ink)}
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:54px;align-items:center}
.about h2{font-size:clamp(2rem,4.4vw,2.9rem);margin:16px 0 18px}
.about p{font-weight:400;color:#3a3a3a;margin-bottom:16px}
.values{display:flex;flex-wrap:wrap;gap:10px;margin-top:20px}
.values span{
  font-weight:700;font-size:.9rem;padding:7px 15px;border-radius:999px;
  border:2.5px solid var(--ink);background:#fff;
}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.stat{
  border:2.5px solid var(--ink);border-radius:var(--r-md);
  padding:28px 24px;box-shadow:var(--shadow-sm);
}
.stat:nth-child(1){background:var(--pink);color:#fff}
.stat:nth-child(2){background:var(--yellow)}
.stat:nth-child(3){background:var(--blue);color:#fff}
.stat:nth-child(4){background:var(--orange);color:#fff}
.stat .big{font-family:"Baloo 2";font-weight:800;font-size:clamp(1.7rem,5vw,2.4rem);line-height:1}
.stat .lbl{font-weight:600;font-size:.96rem;margin-top:6px}

/* ============================================================
   Our belief (mission callout)
   ============================================================ */
.belief{
  margin-top:42px;
  background:var(--yellow);
  border:2.5px solid var(--ink);border-radius:var(--r-lg);
  padding:46px 52px;position:relative;overflow:hidden;
  box-shadow:var(--shadow);
}
.belief .b-cr{position:absolute;width:94px;height:102px;top:-22px;right:46px;--rot:16deg;opacity:.92}
.belief .label{
  display:inline-flex;align-items:center;gap:8px;
  font-weight:700;font-size:.8rem;letter-spacing:.12em;text-transform:uppercase;
  background:var(--ink);color:#fff;padding:7px 16px;border-radius:999px;
}
.belief h3{
  font-size:clamp(1.55rem,3.2vw,2.35rem);margin:18px 0 14px;
  max-width:780px;line-height:1.28;position:relative;z-index:2;
}
.belief p{font-weight:400;font-size:1.05rem;color:#2b2b2b;max-width:700px;position:relative;z-index:2}

/* ============================================================
   Join + subscribe
   ============================================================ */
.join{padding:96px 0;background:#FBF7EE}
.join-head{max-width:680px;margin-bottom:42px}
.join-h2{font-family:"Fraunces",Georgia,serif;font-weight:600;font-size:clamp(2rem,4.4vw,2.9rem);line-height:1.16;margin:14px 0 12px}
.join-lead{font-size:1.05rem;color:#444;font-weight:400;line-height:1.62}
.tracks-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.track{background:#fff;border:2.5px solid var(--ink);border-radius:var(--r-md);padding:30px 28px;box-shadow:var(--shadow-sm);display:flex;flex-direction:column;transition:transform .18s ease,box-shadow .18s ease}
.track:hover{transform:translate(-3px,-3px);box-shadow:8px 10px 0 var(--ink)}
.track-num{font-family:"Fraunces",Georgia,serif;font-weight:600;font-size:1.5rem;line-height:1}
.track:nth-child(1) .track-num{color:var(--pink)}
.track:nth-child(2) .track-num{color:var(--blue)}
.track:nth-child(3) .track-num{color:var(--orange)}
.track:nth-child(4) .track-num{color:var(--navy)}
.track:nth-child(5) .track-num{color:var(--pink)}
.track:nth-child(6) .track-num{color:var(--blue)}
.track-name{font-family:"Fraunces",Georgia,serif;font-weight:600;font-size:1.42rem;line-height:1.2;margin:8px 0 10px}
.track-for{font-size:.91rem;color:#555;font-weight:500;line-height:1.5;margin-bottom:12px}
.track-copy{font-family:"Fraunces",Georgia,serif;font-style:italic;font-size:1.03rem;line-height:1.5;color:#2a2620;flex:1}
.track-funded{margin-top:14px;align-self:flex-start;font-size:.77rem;font-weight:700;padding:5px 12px;border-radius:999px;border:2px solid var(--ink);background:var(--yellow)}
.track-apply{margin-top:16px;align-self:flex-start;font-family:"Baloo 2",sans-serif;font-weight:700;font-size:.88rem;padding:9px 18px;border-radius:999px;border:2.5px solid var(--ink);background:#fff;color:var(--ink);cursor:pointer;box-shadow:3px 4px 0 var(--ink);transition:transform .14s ease,box-shadow .14s ease}
.track-apply:hover{transform:translate(-2px,-2px);box-shadow:5px 6px 0 var(--ink)}
.apply-card{background:var(--ink);color:#fff;border-radius:var(--r-lg);padding:48px 50px;margin-top:30px;position:relative;overflow:hidden}
.apply-card .creature{position:absolute;opacity:.9}
.apply-card h3{font-family:"Fraunces",Georgia,serif;font-weight:600;font-size:1.7rem;margin-bottom:8px;position:relative;z-index:2}
.apply-card .ac-sub{color:#c9c9d8;font-weight:400;margin-bottom:24px;font-size:.98rem;max-width:540px;position:relative;z-index:2}
.apply-card form{position:relative;z-index:2}
.join-card{
  background:var(--ink);color:#fff;border-radius:var(--r-lg);
  padding:60px 56px;position:relative;overflow:hidden;
}
.join-card .creature{position:absolute;opacity:.92}
.jc1{width:130px;height:140px;top:-30px;right:60px;--rot:18deg}
.jc2{width:90px;height:96px;bottom:-26px;right:230px;--rot:-14deg}
.join-grid{display:grid;grid-template-columns:1fr 1fr;gap:48px;position:relative;z-index:2}
.join h2{font-size:clamp(2rem,4.2vw,2.8rem);margin-bottom:14px}
.join .sub{color:#c9c9d8;font-weight:400;margin-bottom:24px}
.join-list{list-style:none}
.join-list li{display:flex;gap:12px;margin-bottom:12px;font-weight:500}
.join-list li .ck{
  flex:none;width:26px;height:26px;border-radius:50%;background:var(--yellow);
  color:var(--ink);display:grid;place-items:center;font-weight:800;font-size:.9rem;
}
form{display:flex;flex-direction:column;gap:14px}
.field label{display:block;font-weight:600;font-size:.85rem;margin-bottom:6px}
.field input,.field textarea,.field select{
  width:100%;font-family:inherit;font-size:.95rem;
  padding:13px 16px;border-radius:14px;border:2.5px solid var(--ink);
  background:#fff;color:var(--ink);
}
.field textarea{resize:vertical;min-height:74px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-note{font-size:.79rem;color:#9a9ab0}
.form-ok{
  display:none;background:var(--yellow);color:var(--ink);
  border:2.5px solid var(--ink);border-radius:14px;padding:14px 16px;
  font-weight:700;font-size:.91rem;
}
.form-ok.show{display:block}

/* —— Newsletter —— */
.subscribe{
  margin-top:30px;background:var(--cream);
  border:2.5px solid var(--ink);border-radius:var(--r-lg);
  padding:38px 44px;display:grid;grid-template-columns:1fr auto;
  gap:30px;align-items:center;
}
.subscribe h3{font-size:1.45rem;margin-bottom:6px}
.subscribe p{font-weight:400;color:#555;font-size:.95rem}
.sub-form{flex-direction:row;gap:10px}
.sub-form input{min-width:260px}
.sub-ok{display:none;margin-top:10px;font-weight:700;color:var(--blue)}
.sub-ok.show{display:block}

/* ============================================================
   Footer
   ============================================================ */
footer{background:var(--ink);color:#fff;padding:62px 0 30px;border-top:2.5px solid var(--ink)}
.foot-grid{display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr;gap:36px;margin-bottom:42px}
.foot-brand .logo .word{color:#fff}
.foot-brand .logo .o{border-color:#fff}
.foot-brand p{color:#9a9ab0;font-weight:400;margin-top:14px;font-size:.94rem;max-width:300px}
.foot-col h4{font-size:1rem;margin-bottom:14px;color:var(--yellow)}
.foot-col a{display:block;color:#c9c9d8;font-weight:400;font-size:.92rem;margin-bottom:9px}
.foot-col a:hover{color:#fff}
.socials{display:flex;gap:10px;margin-top:16px}
.socials a{
  width:40px;height:40px;border-radius:50%;border:2.5px solid #fff;
  display:grid;place-items:center;font-weight:700;font-size:.82rem;
}
.socials a:hover{background:var(--yellow);color:var(--ink);border-color:var(--yellow)}
.foot-base{
  border-top:1.5px solid #34344f;padding-top:24px;
  display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;
  color:#9a9ab0;font-size:.85rem;font-weight:400;
}

/* ---------- Scroll reveal ---------- */
.reveal{opacity:0;transform:translateY(28px);transition:opacity .6s ease, transform .6s ease}
.reveal.in{opacity:1;transform:none}

/* ============================================================
   The soul of LOOMUS — six quiet sections
   ============================================================ */
.soul-intro{background:var(--ink);color:#F4ECDC;border-bottom:2.5px solid var(--ink);padding:74px 0}
.soul-intro .wrap{max-width:680px;text-align:center}
.s-kicker{font-weight:700;font-size:.75rem;letter-spacing:.24em;text-transform:uppercase;color:var(--yellow)}
.doorway{background:#FBF7EE;border-bottom:2.5px solid var(--ink);padding:72px 0;text-align:center}
.doorway .wrap{max-width:680px}
.dw-q{font-family:"Fraunces",Georgia,serif;font-weight:600;font-size:clamp(1.5rem,3.6vw,2.25rem);line-height:1.3;margin:14px 0 16px}
.dw-line{font-family:"Fraunces",Georgia,serif;font-style:italic;font-size:1.04rem;color:#6a6253;line-height:1.7;margin-bottom:26px}
.soul-intro h2{font-family:"Fraunces",Georgia,serif;font-weight:500;font-size:clamp(1.65rem,3.4vw,2.3rem);line-height:1.35;margin:20px 0 16px}
.soul-intro p{font-family:"Fraunces",Georgia,serif;font-style:italic;font-size:1.05rem;color:#bdb39c;line-height:1.7}

.s-sec{background:#FBF7EE;padding:82px 0;border-bottom:2.5px solid var(--ink)}
.s-sec .wrap{max-width:780px}
.s-sec--night{background:var(--navy);color:#EDE6D6}
.s-head{margin-bottom:36px}
.s-eyebrow{font-weight:700;font-size:.74rem;letter-spacing:.2em;text-transform:uppercase;color:#a9a08a}
.s-sec--night .s-eyebrow{color:var(--yellow)}
.s-title{font-family:"Fraunces",Georgia,serif;font-weight:600;font-size:clamp(1.85rem,4vw,2.7rem);line-height:1.16;margin:10px 0 14px}
.s-lead{font-family:"Fraunces",Georgia,serif;font-style:italic;font-size:1.06rem;color:#6a6253;line-height:1.65;max-width:580px}
.s-sec--night .s-lead{color:#b7af9c}
.s-foot{margin-top:24px;font-family:"Fraunces",Georgia,serif;font-style:italic;color:#8a8167}

.big-q{font-family:"Fraunces",Georgia,serif;font-weight:500;font-size:clamp(1.6rem,3.6vw,2.4rem);line-height:1.3;padding:28px 0;border-top:2.5px solid var(--ink);border-bottom:2px dashed #cabf9f;margin-bottom:24px}
.big-q .q-tag{display:block;font-family:"Baloo 2",sans-serif;font-size:.71rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--pink);margin-bottom:13px}
.q-list{list-style:none}
.q-list li{font-family:"Fraunces",Georgia,serif;font-size:1.14rem;line-height:1.5;padding:15px 0 15px 30px;border-bottom:1px solid #e4dcc6;position:relative;color:#3a352c}
.q-list li::before{content:"?";position:absolute;left:0;top:13px;font-family:"Baloo 2";font-weight:800;color:var(--blue);font-size:1.1rem}

.confession{padding:24px 26px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.13);border-radius:14px;margin-bottom:12px}
.confession p{font-family:"Fraunces",Georgia,serif;font-size:1.16rem;line-height:1.5;font-style:italic;color:#F4ECDC}
.confession .c-when{display:block;margin-top:11px;font-family:"Baloo 2",sans-serif;font-size:.75rem;font-weight:600;letter-spacing:.07em;color:#8b96b4}

.cog-now{background:#fff;border:2.5px solid var(--ink);border-radius:var(--r-md);padding:32px 30px;box-shadow:var(--shadow-sm);margin-bottom:22px}
.cog-now .c-label{font-weight:700;font-size:.73rem;letter-spacing:.16em;text-transform:uppercase;color:#a9a08a}
.cog-now .c-reading{font-family:"Fraunces",Georgia,serif;font-weight:600;font-size:clamp(1.45rem,3.2vw,2.1rem);line-height:1.22;margin:11px 0}
.cog-now .c-sub{font-family:"Fraunces",Georgia,serif;font-style:italic;color:#6a6253;line-height:1.6}
.cog-past{display:flex;flex-direction:column;gap:14px}
.cog-past p{font-family:"Fraunces",Georgia,serif;font-size:1.03rem;color:#5b5446;padding-left:20px;border-left:3px solid var(--yellow);line-height:1.55}

.specimens{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.specimen{background:#fff;border:2.5px solid var(--ink);border-radius:14px;padding:22px;box-shadow:var(--shadow-sm)}
.specimen .sp-cat{font-family:"Baloo 2",sans-serif;font-weight:700;font-size:.71rem;letter-spacing:.1em;text-transform:uppercase;color:var(--orange)}
.specimen h3{font-family:"Fraunces",Georgia,serif;font-weight:600;font-size:1.08rem;margin:7px 0 7px;line-height:1.25}
.specimen p{font-size:.92rem;color:#5b5446;font-weight:400;line-height:1.55}

.minds .mind{padding:20px 0;border-bottom:1px solid #e4dcc6;display:flex;gap:18px;align-items:baseline}
.mind .m-mark{font-family:"Fraunces",Georgia,serif;font-style:italic;font-size:1.25rem;color:var(--pink);flex:none;width:30px}
.mind h3{font-family:"Fraunces",Georgia,serif;font-weight:600;font-size:1.14rem;line-height:1.3;margin-bottom:4px}
.mind p{font-size:.93rem;color:#5b5446;font-weight:400;line-height:1.5}

.salon{display:flex;flex-direction:column;gap:16px}
.salon-frag{background:#fff;border:2.5px solid var(--ink);border-radius:var(--r-md);padding:26px 28px;box-shadow:var(--shadow-sm)}
.salon-frag .sf-kind{font-family:"Baloo 2",sans-serif;font-weight:700;font-size:.71rem;letter-spacing:.12em;text-transform:uppercase;color:var(--blue)}
.salon-frag p{font-family:"Fraunces",Georgia,serif;font-size:1.15rem;line-height:1.5;color:#2a2620;margin-top:9px}

/* —— The margin (小纸条 · leave a trace, never a comment thread) —— */
.margin{margin-top:44px;padding-top:28px;border-top:2px dashed #cabf9f}
.s-sec--night .margin{border-top-color:rgba(255,255,255,.22)}
.m-rule{font-weight:700;font-size:.71rem;letter-spacing:.2em;text-transform:uppercase;color:#a9a08a;margin-bottom:16px}
.m-traces{display:flex;flex-wrap:wrap;gap:13px;margin-bottom:22px}
.slip{background:#FFFDF6;border:1.5px solid var(--ink);border-radius:3px;padding:13px 16px;max-width:300px;font-family:"Fraunces",Georgia,serif;font-size:.96rem;font-style:italic;color:#3a352c;line-height:1.45;box-shadow:2px 3px 0 rgba(14,14,14,.13)}
.slip:nth-child(2n){transform:rotate(-1.5deg)}

  ch.addEventListener('click', () => {
    const g = ch.dataset.group;
    document.querySelectorAll('.chip[data-group="'+g+'"]').forEach(c => c.classList.remove('active'));
    ch.classList.add('active');
    f[g] = ch.dataset.value;
    render();
  });
});
render();
</script>
</body>
