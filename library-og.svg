<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#faf7f1"/>

  <!-- Top eyebrow + URL + hairline -->
  <text x="80" y="68" font-family="'SF Mono', Menlo, monospace" font-size="14" letter-spacing="3.5" fill="#c19a3e" font-weight="500">▲ LIBRARY · LOOMUS</text>
  <text x="1120" y="68" text-anchor="end" font-family="'SF Mono', Menlo, monospace" font-size="13" letter-spacing="2.8" fill="#8b8474">loomus.ai/library</text>
  <line x1="80" y1="88" x2="1120" y2="88" stroke="#1f1d18" stroke-width="0.6" opacity="0.18"/>

  <!-- ═════════════════════ LEFT: BOOK SHELF ═════════════════════ -->

  <!-- Shelf surface line -->
  <line x1="100" y1="510" x2="500" y2="510" stroke="#1f1d18" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="100" y1="514" x2="500" y2="514" stroke="#1f1d18" stroke-width="0.6" opacity="0.25"/>

  <!-- 7 books standing on shelf, bottom aligned at y=510 -->

  <!-- Book 1 — Forest deep -->
  <g>
    <rect x="135" y="240" width="40" height="270" fill="#2d4a3e" stroke="#1a3329" stroke-width="1.3" rx="1.8"/>
    <rect x="135" y="285" width="40" height="3.5" fill="#d4ac4a"/>
    <rect x="135" y="460" width="40" height="3.5" fill="#d4ac4a"/>
  </g>

  <!-- Book 2 — Ochre -->
  <g>
    <rect x="180" y="270" width="36" height="240" fill="#c19a3e" stroke="#a07a26" stroke-width="1.3" rx="1.8"/>
    <rect x="180" y="315" width="36" height="3.5" fill="#1f1d18"/>
    <rect x="180" y="465" width="36" height="3.5" fill="#1f1d18"/>
  </g>

  <!-- Book 3 — Terracotta (tallest) -->
  <g>
    <rect x="221" y="215" width="44" height="295" fill="#c66b3d" stroke="#a04826" stroke-width="1.3" rx="1.8"/>
    <rect x="221" y="260" width="44" height="3.5" fill="#d4ac4a"/>
    <rect x="221" y="460" width="44" height="3.5" fill="#d4ac4a"/>
  </g>

  <!-- Book 4 — Plum (short) -->
  <g>
    <rect x="270" y="290" width="38" height="220" fill="#6b3a4a" stroke="#4a2a35" stroke-width="1.3" rx="1.8"/>
    <rect x="270" y="335" width="38" height="3.5" fill="#d4ac4a"/>
    <rect x="270" y="465" width="38" height="3.5" fill="#d4ac4a"/>
  </g>

  <!-- Book 5 — Ink -->
  <g>
    <rect x="313" y="250" width="42" height="260" fill="#1f1d18" stroke="#0a0a0a" stroke-width="1.3" rx="1.8"/>
    <rect x="313" y="295" width="42" height="3.5" fill="#c19a3e"/>
    <rect x="313" y="460" width="42" height="3.5" fill="#c19a3e"/>
  </g>

  <!-- Book 6 — Paper-warm (cream, with darker accents) -->
  <g>
    <rect x="360" y="275" width="44" height="235" fill="#ede4d3" stroke="#8b8474" stroke-width="1.3" rx="1.8"/>
    <rect x="360" y="320" width="44" height="3.5" fill="#2d4a3e"/>
    <rect x="360" y="465" width="44" height="3.5" fill="#2d4a3e"/>
  </g>

  <!-- Book 7 — Forest deeper -->
  <g>
    <rect x="409" y="225" width="40" height="285" fill="#1a3329" stroke="#0a0a0a" stroke-width="1.3" rx="1.8"/>
    <rect x="409" y="270" width="40" height="3.5" fill="#d4ac4a"/>
    <rect x="409" y="460" width="40" height="3.5" fill="#d4ac4a"/>
  </g>

  <!-- Book 8 — Pulled out / tilted (the "pick one to read" gesture) -->
  <g transform="rotate(-8, 478, 510)">
    <rect x="458" y="285" width="40" height="225" fill="#c66b3d" stroke="#a04826" stroke-width="1.3" rx="1.8"/>
    <rect x="458" y="330" width="40" height="3.5" fill="#faf7f1"/>
    <rect x="458" y="465" width="40" height="3.5" fill="#faf7f1"/>
  </g>

  <!-- ═════════════════════ RIGHT: TAGLINE ═════════════════════ -->

  <!-- Big tagline -->
  <text x="560" y="230" font-family="Fraunces, Georgia, serif" font-weight="500" font-size="64" fill="#1f1d18" letter-spacing="-1.2">The Founder's</text>
  <text x="560" y="302" font-family="Fraunces, Georgia, serif" font-weight="500" font-size="64" font-style="italic" fill="#c19a3e" letter-spacing="-1.2">Library</text>

  <!-- Sub-tagline -->
  <text x="560" y="370" font-family="'Newsreader', Georgia, serif" font-style="italic" font-size="24" fill="#4a463c">A library for people who want to</text>
  <text x="560" y="402" font-family="'Newsreader', Georgia, serif" font-style="italic" font-size="24" fill="#4a463c">know <tspan fill="#c19a3e" font-weight="500">how things actually work</tspan>.</text>

  <!-- Mono pill -->
  <g transform="translate(560, 444)">
    <rect x="0" y="0" width="420" height="40" rx="20" fill="none" stroke="#c19a3e" stroke-width="1.5"/>
    <text x="210" y="26" text-anchor="middle" font-family="'SF Mono', Menlo, monospace" font-size="12" letter-spacing="2.2" fill="#c19a3e" font-weight="600">100 BOOKS  ·  7 CATEGORIES  ·  6 LANGUAGES</text>
  </g>

  <!-- Bottom rule + byline -->
  <line x1="80" y1="582" x2="1120" y2="582" stroke="#1f1d18" stroke-width="0.6" opacity="0.18"/>
  <text x="80" y="606" font-family="'SF Mono', Menlo, monospace" font-size="11" letter-spacing="2.8" fill="#8b8474">— SELECTED BY SOPHIE REN  ·  A DEEP READING LIST FROM FIRST PRINCIPLES</text>
</svg>
