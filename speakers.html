const b64ToBytes = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));

async function deriveKey(password, salt, iter) {
  const enc = new TextEncoder();
  const base = await crypto.subtle.importKey(
    "raw", enc.encode(password), { name: "PBKDF2" }, false, ["deriveKey"]
  );
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations: iter, hash: "SHA-256" },
    base, { name: "AES-GCM", length: 256 }, false, ["decrypt"]
  );
}

async function tryDecrypt(pw) {
  const salt = b64ToBytes(BUNDLE.salt);
  const iv = b64ToBytes(BUNDLE.iv);
  const ct = b64ToBytes(BUNDLE.ct);
  const key = await deriveKey(pw, salt, BUNDLE.iter);
  const ptBuf = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ct);
  return new TextDecoder().decode(ptBuf);
}

const form = document.getElementById("f");
const errEl = document.getElementById("err");
const gate = document.getElementById("gate");
const wrap = document.getElementById("frame-wrap");
const frame = document.getElementById("frame");

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  errEl.textContent = "";
  const pw = document.getElementById("pw").value;
  try {
    const html = await tryDecrypt(pw);
    sessionStorage.setItem("loomus_speakers_ok", "1");
    reveal(html);
  } catch (err) {
    errEl.textContent = "Incorrect password.";
  }
});

function reveal(html) {
  gate.style.display = "none";
  document.querySelector("footer").style.display = "none";
  wrap.style.display = "block";
  frame.srcdoc = html;
  document.title = "Speakers — LOOMUS";
}

// auto-unlock within the same session
(async () => {
  if (sessionStorage.getItem("loomus_speakers_ok") === "1") {
    // no stored password — user still needs to re-enter once per session start? 
    // sessionStorage cleared on tab close; keep gate for now.
  }
})();
</script>
