const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));

async function decrypt(pw) {
  const enc = new TextEncoder();
  const base = await crypto.subtle.importKey("raw", enc.encode(pw), {name:"PBKDF2"}, false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    {name:"PBKDF2", salt:b64(BUNDLE.salt), iterations:BUNDLE.iter, hash:"SHA-256"},
    base, {name:"AES-GCM", length:256}, false, ["decrypt"]
  );
  const pt = await crypto.subtle.decrypt({name:"AES-GCM", iv:b64(BUNDLE.iv)}, key, b64(BUNDLE.ct));
  return new TextDecoder().decode(pt);
}

document.getElementById("f").addEventListener("submit", async (e) => {
  e.preventDefault();
  const errEl = document.getElementById("err");
  const btn = document.getElementById("btn");
  errEl.textContent = ""; btn.disabled = true; btn.textContent = "Unlocking…";
  try {
    const html = await decrypt(document.getElementById("pw").value);
    // Replace entire document so the inner page runs as a normal page —
    // no iframe, no base-href weirdness, all relative paths resolve to /loomus.ai.
    document.open();
    document.write(html);
    document.close();
  } catch (_) {
    btn.disabled = false; btn.textContent = "Enter";
    errEl.textContent = "Incorrect password.";
  }
});
</script>
