  return new TextDecoder().decode(pt);
}

document.getElementById("f").addEventListener("submit", async (e) => {
  e.preventDefault();
  const errEl = document.getElementById("err");
  const btn = document.getElementById("btn");
  errEl.textContent = ""; btn.disabled = true; btn.textContent = "Unlocking…";
  try {
    const html = await decrypt(document.getElementById("pw").value);
    // Replace entire document so the inner page runs as a normal page —
    // no iframe, no base-href weirdness, all relative paths resolve to /loomus.ai.
    document.open();
    document.write(html);
    document.close();
  } catch (_) {
    btn.disabled = false; btn.textContent = "Enter";
    errEl.textContent = "Incorrect password.";
  }
});
</script>
